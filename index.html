<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Bootstrap link -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" type="text/css" href="./style.css" />
  <title>Weather Dashboard</title>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="weather-dashboard">
      <span class="navbar-brand mb-0 h1 text-white">Weather Dashboard</span>
    </div>
  </nav>




  <div class="container">
    <!-- Left Search Column -->
    <div class="search-column">
      <h2>Search</h2>
      <input type="text" placeholder="Search...">
      <button>Submit</button>
      
      <!-- Nested "bottom-div" within "search-column" -->
      <div class="bottom-div">
        <h2>Bottom Div</h2>
        <p>Content for the bottom div goes here.</p>
      </div>
    </div>

    <!-- Right-side Stacking Divs with content -->
    <div class="stacking-div">
      <div>
        <h2>Div 1</h2>
        <p>Content for div 1 goes here.</p>
      </div>

      <div>
        <h2>Div 2</h2>
        <p>Content for div 2 goes here.</p>
      </div>
    </div>
  </div>

  <!-- jQuery link -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <!-- Custom JavaScript -->
  <script src="./script.js"></script>
</body>
</html>
